  <section id="{{id}}" class="section section--{{theme}}">
    <div class="container">
      <div class="grid">

        <div class="col-4">
          <p class="label muted" style="margin-bottom: 1rem">Direct Contact</p>

          <p style="margin-bottom: 0.4rem; font-weight: 600">Email</p>
          <p style="margin-bottom: 1.5rem">
            <a class="link" href="mailto:{{email}}">{{email}}</a>
          </p>

          <p style="margin-bottom: 0.4rem; font-weight: 600">Phone</p>
          <p style="margin-bottom: 2rem">
            <a href="tel:{{phone_dial}}">{{phone_display}}</a>
          </p>

          <p class="label muted" style="margin-bottom: 1rem">Service Area</p>
          <p style="opacity: 0.7">{{service_area}}</p>
        </div>

        <div class="col-8">
          <form class="form" name="contact" method="POST" netlify netlify-honeypot="bot-field" action="/thank-you">
            <input type="hidden" name="form-name" value="contact">
            <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>

            <div class="form-row">
              <div class="field">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" required>
              </div>
              <div class="field">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" required>
              </div>
            </div>

            <div class="form-row">
              <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
              </div>
              <div class="field">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone">
              </div>
            </div>

            <div class="field">
              <label for="service">Service Interested In</label>
              <select id="service" name="service">
                <option value="">Select one...</option>
                {{service_options}}
                <option value="unsure">Not Sure Yet</option>
              </select>
            </div>

            <div class="field">
              <label for="message">{{message_label}}</label>
              <textarea id="message" name="message" required
                placeholder="{{message_placeholder}}"></textarea>
            </div>

            <div>
              <button type="submit" class="btn btn--dark">Send Message</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>

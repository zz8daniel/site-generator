  <section class="section section--{{theme}} section--hero-message">

      <div class="grid">
        <div class="col-8 col-offset-2 hero-message__inner">
          <p class="label muted">{{eyebrow}}</p>
          <h1 class="hero-message__title">{{heading}}</h1>
          <p class="hero-message__body">
            {{body}}
          </p>
          <a class="btn btn--ghost-white" href="{{button_href}}"{{button_attrs}}>{{button_label}}</a>
        </div>
      </div>
    </div>
  </section>

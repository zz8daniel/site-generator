  <section class="section section--{{theme}}" style="min-height: 70vh; display:flex; align-items:center">
    <div class="container">
      <div class="grid">
        <div class="col-8" style="grid-column: 3 / span 8; text-align: center">
          <p class="label muted" style="margin-bottom: 0.5rem">{{eyebrow}}</p>
          <h1 style="font-size: clamp(2rem, 4vw, 3.5rem); margin-top: 0; margin-bottom: 1.5rem">{{heading}}</h1>
          <p style="font-size: 1.05rem; opacity: 0.8; margin: 0 auto 2.5rem">
            {{body}}
          </p>
          <a class="btn btn--ghost-white" href="{{button_href}}"{{button_attrs}}>{{button_label}}</a>
        </div>
      </div>
    </div>
  </section>

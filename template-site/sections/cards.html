  <section id="{{id}}" class="section section--{{theme}}">
    <div class="container">
      <div class="grid">

        <div class="col-12">
          <p class="label muted" style="margin-bottom: 0.5rem">{{eyebrow}}</p>
          <h2 style="margin-top: 0; margin-bottom: 1.5rem">{{heading}}</h2>
          <div class="prose" style="font-size: 1.05rem; opacity: 0.8; max-width: 65ch">
            {{intro_html}}
          </div>
        </div>

        {{cards_html}}

        <div class="col-12" style="margin-top: 0.5rem">
          <a class="btn btn--dark" href="{{cta_href}}"{{cta_attrs}}>{{cta_label}}</a>
        </div>

      </div>
    </div>
  </section>

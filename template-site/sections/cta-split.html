  <section id="{{id}}" class="section section--{{theme}}">
    <div class="container">
      <div class="grid cta-split__grid">

        <div class="col-5 img-card cta-split__image">
          <img src="./images/{{image}}" alt="{{alt}}">
        </div>

        <div class="col-7">
          <h2>{{heading}}</h2>
          <p class="cta-split__body">
            {{body}}
          </p>
          <div class="cta-split__actions">
            <a class="btn btn--white" href="{{primary_href}}"{{primary_attrs}}>{{primary_label}}</a>
            <a class="btn btn--ghost-white" href="{{secondary_href}}"{{secondary_attrs}}>{{secondary_label}}</a>
          </div>
        </div>

      </div>
    </div>
  </section>

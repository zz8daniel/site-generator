  <section id="{{id}}" class="hero">
    <div class="hero__bg"
         style="background-image: url('./images/{{bg_image}}')"></div>
    <div class="container">
      <div class="grid">
        <div class="col-8 hero__content">
          <h1 class="hero__title">{{title_line1}}<br>{{title_line2}}</h1>
          <p class="hero__subtitle">{{subtitle}}</p>
          <a class="btn btn--white" href="{{button_href}}"{{button_attrs}}>{{button_label}}</a>
        </div>
      </div>
    </div>
  </section>
